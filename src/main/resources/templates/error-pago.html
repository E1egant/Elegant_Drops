<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Drops | Pago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/premium-admin.css}">
</head>
<body>

<nav class="h-24 premium-navbar flex justify-between items-center px-12 sticky top-0 z-50">
    <a th:href="@{/}" class="flex items-center gap-6">
        <img th:src="@{/images/logo-elegant.png}" alt="Logo" class="h-16 w-auto">
        <div class="flex flex-col border-l pl-6 border-white/10">
            <span class="text-lg font-luxury text-white tracking-widest uppercase">Elegant Drops</span>
            <span class="text-[8px] tracking-[0.4em] text-[#c9967a] font-bold uppercase mt-1">Decants & Fragrances</span>
        </div>
    </a>
</nav>

<main class="container mx-auto px-8 py-32 max-w-lg text-center">
    <div class="w-20 h-20 rounded-full bg-red-900/20 border border-red-900/40 flex items-center justify-center mx-auto mb-8">
        <i class="fas fa-times text-red-500 text-2xl"></i>
    </div>
    <h2 class="text-3xl font-luxury text-white uppercase tracking-widest mb-4">Atención</h2>
    <div class="h-0.5 w-12 bg-[#c9967a] mx-auto mb-8"></div>
    <div class="card-perfume p-8 mb-8">
        <p class="text-zinc-400 text-sm" th:text="${mensaje}"></p>
    </div>
    <div class="space-y-4">
        <a href="https://wa.me/56982055029" target="_blank"
           class="flex items-center justify-center gap-3 w-full py-4 rounded-2xl border border-white/10 bg-[#1a1714] text-white hover:border-[#c9967a]/30 transition">
            <i class="fab fa-whatsapp text-green-500 text-xl"></i>
            <span class="text-sm font-bold">Coordinar por WhatsApp</span>
        </a>
        <a th:href="@{/}" class="btn-luxury w-full py-4 text-xs uppercase tracking-widest block text-center">
            Volver a la tienda
        </a>
    </div>
</main>

<footer class="border-t border-white/[0.03] py-16 text-center">
    <p class="text-[9px] tracking-[0.6em] text-zinc-700 uppercase">Elegant Drops Chile · Excellence in Every Drop</p>
</footer>
</body>
</html>
